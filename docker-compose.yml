services:
  mysql:
    image: mysql:8.0
    container_name: auctiohub-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: auctiohub
      MYSQL_USER: auctiohub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pauctiohub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
